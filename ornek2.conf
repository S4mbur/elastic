input {
  jdbc {
    id => "oracle_index_space_jdbc"

    jdbc_driver_library => "/usr/share/logstash/drivers/ojdbc11.jar"
    jdbc_driver_class => "Java::oracle.jdbc.OracleDriver"

    jdbc_connection_string => "${ORACLE_JDBC_URL}"
    jdbc_user => "${ORACLE_USER}"
    jdbc_password => "${ORACLE_PASSWORD}"

    schedule => "*/5 * * * *"

    add_field => {
      "space_kind" => "index"
    }

    statement => "
      WITH periods AS (
          SELECT 1 AS period_days FROM dual UNION ALL
          SELECT 2 AS period_days FROM dual UNION ALL
          SELECT 3 AS period_days FROM dual UNION ALL
          SELECT 5 AS period_days FROM dual UNION ALL
          SELECT 7 AS period_days FROM dual UNION ALL
          SELECT 14 AS period_days FROM dual UNION ALL
          SELECT 30 AS period_days FROM dual
      ),

      segment_base AS (
          SELECT
              owner,
              object_name,
              segment_type,
              TRUNC(log_date) AS log_day,
              TO_CHAR(TRUNC(log_date), 'YYYY-MM-DD') AS log_day_str,
              TRUNC(log_date) - DATE '1970-01-01' AS day_num,
              log_date,
              size_mb
          FROM VTB.TB_DB_SPACE_LOG
          WHERE log_date >= TRUNC(SYSDATE) - 90
            AND UPPER(REPLACE(log_type, ' ', '_')) = 'SEGMENT'
            AND UPPER(segment_type) IN ('INDEX', 'INDEX PARTITION', 'INDEX SUBPARTITION')
      ),

      segment_snapshot AS (
          SELECT
              owner,
              object_name,
              log_day,
              log_day_str,
              day_num,
              log_date,
              SUM(size_mb) AS snapshot_size_mb
          FROM segment_base
          GROUP BY
              owner,
              object_name,
              log_day,
              log_day_str,
              day_num,
              log_date
      ),

      segment_daily AS (
          SELECT
              owner,
              object_name,
              owner || '.' || object_name AS entity_name,
              'INDEX_TOTAL' AS segment_type,
              log_day,
              log_day_str,
              day_num,
              MAX(log_date) AS log_date,
              MAX(snapshot_size_mb) KEEP (
                  DENSE_RANK LAST ORDER BY log_date
              ) AS size_mb
          FROM segment_snapshot
          GROUP BY
              owner,
              object_name,
              log_day,
              log_day_str,
              day_num
      ),

      current_indexes AS (
          SELECT *
          FROM (
              SELECT
                  d.*,
                  ROW_NUMBER() OVER (
                      PARTITION BY owner, object_name
                      ORDER BY day_num DESC
                  ) AS rn
              FROM segment_daily d
          )
          WHERE rn = 1
      ),

      index_only_base AS (
          SELECT
              owner,
              object_name,
              TRUNC(log_date) AS log_day,
              TO_CHAR(TRUNC(log_date), 'YYYY-MM-DD') AS log_day_str,
              TRUNC(log_date) - DATE '1970-01-01' AS day_num,
              log_date,
              size_mb
          FROM VTB.TB_DB_SPACE_LOG
          WHERE log_date >= TRUNC(SYSDATE) - 90
            AND UPPER(REPLACE(log_type, ' ', '_')) = 'SEGMENT'
            AND UPPER(segment_type) = 'INDEX'
      ),

      index_only_snapshot AS (
          SELECT
              owner,
              object_name,
              log_day,
              log_day_str,
              day_num,
              log_date,
              SUM(size_mb) AS snapshot_size_mb
          FROM index_only_base
          GROUP BY
              owner,
              object_name,
              log_day,
              log_day_str,
              day_num,
              log_date
      ),

      index_only_daily AS (
          SELECT
              owner,
              object_name,
              owner || '.' || object_name AS entity_name,
              'INDEX_ONLY' AS segment_type,
              log_day,
              log_day_str,
              day_num,
              MAX(log_date) AS log_date,
              MAX(snapshot_size_mb) KEEP (
                  DENSE_RANK LAST ORDER BY log_date
              ) AS size_mb
          FROM index_only_snapshot
          GROUP BY
              owner,
              object_name,
              log_day,
              log_day_str,
              day_num
      ),

      current_index_only AS (
          SELECT *
          FROM (
              SELECT
                  d.*,
                  ROW_NUMBER() OVER (
                      PARTITION BY owner, object_name
                      ORDER BY day_num DESC
                  ) AS rn
              FROM index_only_daily d
          )
          WHERE rn = 1
      ),

      index_growth_rows AS (
          SELECT
              c.owner,
              c.object_name,
              c.entity_name,
              c.segment_type,
              c.log_day,
              c.log_day_str,
              c.day_num,
              p.period_days,
              c.log_date,
              c.size_mb AS current_size_mb,
              prev.size_mb AS previous_size_mb,
              c.size_mb - prev.size_mb AS diff_mb,
              ROUND(
                  ((c.size_mb - prev.size_mb) / NULLIF(prev.size_mb, 0)) * 100,
                  2
              ) AS pct_change,
              ROW_NUMBER() OVER (
                  PARTITION BY c.owner, c.object_name, p.period_days
                  ORDER BY prev.day_num DESC
              ) AS prev_rn
          FROM current_indexes c
          CROSS JOIN periods p
          JOIN segment_daily prev
              ON prev.owner = c.owner
             AND prev.object_name = c.object_name
             AND prev.day_num <= c.day_num - p.period_days
      )

      SELECT
          'INDEX_DAILY' AS metric_group,
          d.owner,
          d.object_name,
          d.entity_name,
          d.segment_type,
          d.log_day,
          d.log_day_str,
          d.day_num,
          0 AS period_days,
          d.log_date,
          d.size_mb AS current_size_mb,
          CAST(NULL AS NUMBER) AS previous_size_mb,
          CAST(NULL AS NUMBER) AS diff_mb,
          CAST(NULL AS NUMBER) AS pct_change,
          CAST(NULL AS NUMBER) AS total_space_mb,
          'INDEX_DAILY|' || d.owner || '|' || d.object_name || '|' || TO_CHAR(d.log_day, 'YYYYMMDD') AS doc_id
      FROM segment_daily d

      UNION ALL

      SELECT
          'INDEX_CURRENT' AS metric_group,
          c.owner,
          c.object_name,
          c.entity_name,
          c.segment_type,
          c.log_day,
          c.log_day_str,
          c.day_num,
          0 AS period_days,
          c.log_date,
          c.size_mb AS current_size_mb,
          CAST(NULL AS NUMBER) AS previous_size_mb,
          CAST(NULL AS NUMBER) AS diff_mb,
          CAST(NULL AS NUMBER) AS pct_change,
          CAST(NULL AS NUMBER) AS total_space_mb,
          'INDEX_CURRENT|' || c.owner || '|' || c.object_name AS doc_id
      FROM current_indexes c

      UNION ALL

      SELECT
          'INDEX_ONLY_CURRENT' AS metric_group,
          c.owner,
          c.object_name,
          c.entity_name,
          c.segment_type,
          c.log_day,
          c.log_day_str,
          c.day_num,
          0 AS period_days,
          c.log_date,
          c.size_mb AS current_size_mb,
          CAST(NULL AS NUMBER) AS previous_size_mb,
          CAST(NULL AS NUMBER) AS diff_mb,
          CAST(NULL AS NUMBER) AS pct_change,
          CAST(NULL AS NUMBER) AS total_space_mb,
          'INDEX_ONLY_CURRENT|' || c.owner || '|' || c.object_name AS doc_id
      FROM current_index_only c

      UNION ALL

      SELECT
          'INDEX_GROWTH' AS metric_group,
          g.owner,
          g.object_name,
          g.entity_name,
          g.segment_type,
          g.log_day,
          g.log_day_str,
          g.day_num,
          g.period_days,
          g.log_date,
          g.current_size_mb,
          g.previous_size_mb,
          g.diff_mb,
          g.pct_change,
          CAST(NULL AS NUMBER) AS total_space_mb,
          'INDEX_GROWTH|' || g.period_days || '|' || g.owner || '|' || g.object_name AS doc_id
      FROM index_growth_rows g
      WHERE g.prev_rn = 1
    "

    lowercase_column_names => true
  }
}

filter {
  if [space_kind] == "index" {
    mutate {
      add_field => {
        "source_db" => "takascdb"
        "metric_type" => "oracle_index_space_dashboard"
      }
    }

    date {
      match => [ "log_date", "ISO8601", "yyyy-MM-dd HH:mm:ss", "yyyy-MM-dd HH:mm:ss.SSS" ]
      target => "@timestamp"
      timezone => "Europe/Istanbul"
    }
  }
}

output {
  if [space_kind] == "index" {
    stdout {
      codec => rubydebug
    }

    elasticsearch {
      hosts => ["http://elasticsearch:9200"]
      index => "oracle-index-space-dashboard-v5"
      document_id => "%{doc_id}"
    }
  }
}
