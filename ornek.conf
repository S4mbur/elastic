input {
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/drivers/ojdbc11.jar"
    jdbc_driver_class => "Java::oracle.jdbc.OracleDriver"

    jdbc_connection_string => "${ORACLE_JDBC_URL}"
    jdbc_user => "${ORACLE_USER}"
    jdbc_password => "${ORACLE_PASSWORD}"

    schedule => "*/5 * * * *"

    statement => "
      WITH snapshot_totals AS (
          SELECT
              owner,
              object_name,
              TRUNC(log_date) AS log_day,
              log_date,
              SUM(size_mb) AS total_size_mb
          FROM TB_DB_SPACE_LOG
          WHERE log_type = 'SEGMENT'
            AND segment_type IN ('TABLE', 'TABLE PARTITION', 'TABLE SUBPARTITION')
          GROUP BY
              owner,
              object_name,
              TRUNC(log_date),
              log_date
      ),
      daily AS (
          SELECT
              owner,
              object_name,
              log_day,
              MAX(log_date) AS log_date,
              MAX(total_size_mb) KEEP (
                  DENSE_RANK LAST ORDER BY log_date
              ) AS size_mb
          FROM snapshot_totals
          GROUP BY
              owner,
              object_name,
              log_day
      ),
      latest AS (
          SELECT
              d.*,
              ROW_NUMBER() OVER (
                  PARTITION BY owner, object_name
                  ORDER BY log_day DESC
              ) AS rn
          FROM daily d
      ),
      current_rows AS (
          SELECT *
          FROM latest
          WHERE rn = 1
      )
      SELECT
          c.owner,
          c.object_name,
          'TABLE_TOTAL' AS segment_type,
          c.owner || '.' || c.object_name AS segment_full_name,
          c.owner || '|' || c.object_name AS doc_id,

          c.log_date,
          c.log_day,

          c.size_mb AS current_size_mb,

          d1.size_mb AS size_mb_1d_ago,
          c.size_mb - d1.size_mb AS diff_mb_1d,
          ROUND(
              ((c.size_mb - d1.size_mb) / NULLIF(d1.size_mb, 0)) * 100,
              2
          ) AS pct_change_1d,

          d7.size_mb AS size_mb_7d_ago,
          c.size_mb - d7.size_mb AS diff_mb_7d,
          ROUND(
              ((c.size_mb - d7.size_mb) / NULLIF(d7.size_mb, 0)) * 100,
              2
          ) AS pct_change_7d

      FROM current_rows c
      LEFT JOIN daily d1
          ON d1.owner = c.owner
         AND d1.object_name = c.object_name
         AND d1.log_day = c.log_day - 1
      LEFT JOIN daily d7
          ON d7.owner = c.owner
         AND d7.object_name = c.object_name
         AND d7.log_day = c.log_day - 7
    "

    lowercase_column_names => true
  }
}

filter {
  mutate {
    add_field => {
      "metric_type" => "oracle_table_total_size_growth"
      "source_db" => "takascdb"
    }
  }

  date {
    match => [ "log_date", "ISO8601", "yyyy-MM-dd HH:mm:ss", "yyyy-MM-dd HH:mm:ss.SSS" ]
    target => "@timestamp"
    timezone => "Europe/Istanbul"
  }
}

output {
  stdout {
    codec => rubydebug
  }

  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "oracle-table-size-growth-v2"
    document_id => "%{doc_id}"
  }
}
