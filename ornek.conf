input {
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/drivers/ojdbc11.jar"
    jdbc_driver_class => "Java::oracle.jdbc.OracleDriver"

    jdbc_connection_string => "${ORACLE_JDBC_URL}"
    jdbc_user => "${ORACLE_USER}"
    jdbc_password => "${ORACLE_PASSWORD}"

    schedule => "*/5 * * * *"

    statement => "
      WITH base AS (
          SELECT
              CASE
                  WHEN UPPER(REPLACE(log_type, ' ', '_')) = 'SEGMENT'
                  THEN 'SEGMENT_TABLE'
                  WHEN UPPER(REPLACE(log_type, ' ', '_')) = 'TOTAL_SPACE'
                  THEN 'TOTAL_SPACE'
              END AS metric_group,

              CASE
                  WHEN UPPER(REPLACE(log_type, ' ', '_')) = 'SEGMENT'
                  THEN owner
                  ELSE NVL(owner, 'DATABASE')
              END AS owner_key,

              CASE
                  WHEN UPPER(REPLACE(log_type, ' ', '_')) = 'SEGMENT'
                  THEN object_name
                  ELSE NVL(object_name, 'TOTAL_SPACE')
              END AS object_key,

              CASE
                  WHEN UPPER(REPLACE(log_type, ' ', '_')) = 'SEGMENT'
                  THEN owner || '.' || object_name
                  ELSE
                      CASE
                          WHEN owner IS NOT NULL OR object_name IS NOT NULL
                          THEN 'TOTAL_SPACE.' || NVL(owner, 'DATABASE') || '.' || NVL(object_name, 'TOTAL')
                          ELSE 'TOTAL_SPACE'
                      END
              END AS entity_name,

              CASE
                  WHEN UPPER(REPLACE(log_type, ' ', '_')) = 'SEGMENT'
                  THEN 'TABLE_TOTAL'
                  ELSE 'TOTAL_SPACE'
              END AS segment_type_key,

              TRUNC(log_date) AS log_day,
              log_date,
              size_mb
          FROM TB_DB_SPACE_LOG
          WHERE log_date >= TRUNC(SYSDATE) - 60
            AND (
                  (
                    UPPER(REPLACE(log_type, ' ', '_')) = 'SEGMENT'
                    AND UPPER(segment_type) IN ('TABLE', 'TABLE PARTITION', 'TABLE SUBPARTITION')
                    AND UPPER(object_name) <> 'TB_DB_SPACE_LOG'
                  )
                  OR
                  (
                    UPPER(REPLACE(log_type, ' ', '_')) = 'TOTAL_SPACE'
                  )
                )
      ),
      snapshot_totals AS (
          SELECT
              metric_group,
              owner_key,
              object_key,
              entity_name,
              segment_type_key,
              log_day,
              log_date,
              SUM(size_mb) AS snapshot_size_mb
          FROM base
          WHERE metric_group IS NOT NULL
          GROUP BY
              metric_group,
              owner_key,
              object_key,
              entity_name,
              segment_type_key,
              log_day,
              log_date
      ),
      daily AS (
          SELECT
              metric_group,
              owner_key,
              object_key,
              entity_name,
              segment_type_key,
              log_day,
              MAX(log_date) AS log_date,
              MAX(snapshot_size_mb) KEEP (
                  DENSE_RANK LAST ORDER BY log_date
              ) AS size_mb
          FROM snapshot_totals
          GROUP BY
              metric_group,
              owner_key,
              object_key,
              entity_name,
              segment_type_key,
              log_day
      )
      SELECT
          metric_group,
          owner_key AS owner,
          object_key AS object_name,
          entity_name,
          segment_type_key AS segment_type,
          log_day,
          log_date,
          size_mb,
          metric_group || '|' || owner_key || '|' || object_key || '|' || TO_CHAR(log_day, 'YYYYMMDD') AS doc_id
      FROM daily
    "

    lowercase_column_names => true
  }
}

filter {
  mutate {
    add_field => {
      "source_db" => "takascdb"
      "metric_type" => "oracle_space_daily_snapshot"
    }
  }

  date {
    match => [ "log_date", "ISO8601", "yyyy-MM-dd HH:mm:ss", "yyyy-MM-dd HH:mm:ss.SSS" ]
    target => "@timestamp"
    timezone => "Europe/Istanbul"
  }
}

output {
  stdout {
    codec => rubydebug
  }

  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "oracle-space-daily-v3"
    document_id => "%{doc_id}"
  }
}
